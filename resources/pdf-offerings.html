<script>
const embedded = JSON.parse(document.getElementById('embedded-report').textContent);
let report = embedded;
async function loadReport() {
  try {
    const res = await fetch('/reports/pdf-offerings', {headers: {'Accept': 'application/json'}});
    if (res.ok) report = await res.json();
  } catch (_) {}
  render();
}
function fmtMoney(value) { return value == null ? '' : new Intl.NumberFormat('ko-KR').format(value); }
function render() {
  document.getElementById('meta').textContent = `생성시각: ${report.generated_at} / API: /reports/pdf-offerings`;
  document.getElementById('stats').innerHTML = [
    ['PDF', report.totals.files], ['Artifacts', report.totals.artifacts], ['Offerings', report.totals.offerings], ['Source files', report.files.length]
  ].map(([label, value]) => `<div class="stat"><span>${label}</span><strong>${value}</strong></div>`).join('');
  const fileFilter = document.getElementById('fileFilter');
  if (fileFilter.options.length === 1) {
    for (const file of report.files) fileFilter.insertAdjacentHTML('beforeend', `<option value="${file.filename}">${file.filename} (${file.offerings})</option>`);
  }
  renderRows();
}
function renderRows() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const file = document.getElementById('fileFilter').value;
  const rows = report.offerings.filter(row => (!file || row.file === file) && (!q || [row.file,row.application_unit_label,row.housing_name,row.gender_requirement].join(' ').toLowerCase().includes(q)));
  const table = document.getElementById('offeringsTable');
  table.innerHTML = `<thead><tr>
    <th style="width:48px">#</th><th style="width:180px">PDF</th><th>신청 가능 단위</th><th>주택명</th><th class="num" style="width:80px">면적</th><th class="num" style="width:80px">공급</th><th class="num" style="width:120px">전세금액</th><th class="num" style="width:110px">보증금</th><th class="num" style="width:100px">월임대료</th><th class="num" style="width:100px">기숙사비</th><th style="width:70px">성별</th><th style="width:80px">신뢰도</th>
  </tr></thead><tbody>${rows.map((row, index) => `<tr>
    <td class="num">${index + 1}</td><td class="file">${row.file}</td><td>${row.application_unit_label}</td><td>${row.housing_name}</td><td class="num">${row.exclusive_area_m2 ?? ''}</td><td class="num">${row.supply_count ?? ''}</td><td class="num">${fmtMoney(row.jeonse_deposit_krw)}</td><td class="num">${fmtMoney(row.deposit_krw)}</td><td class="num">${fmtMoney(row.monthly_rent_krw)}</td><td class="num">${fmtMoney(row.dormitory_fee_krw)}</td><td>${row.gender_requirement}</td><td class="num">${row.confidence}</td>
  </tr>`).join('')}</tbody>`;
  if (!rows.length) table.outerHTML = '<div class="empty">조건에 맞는 공급항목이 없습니다.</div>';
}
document.getElementById('search').addEventListener('input', renderRows);
document.getElementById('fileFilter').addEventListener('change', renderRows);
loadReport();
</script>
